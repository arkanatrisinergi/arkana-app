<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Arkana App">
  <meta name="theme-color" content="#080B12">
  <title>Arkana AI — Arkana App</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/chat.css">
  <script src="config.js?v=2.1.0"></script>
  <script src="js/constants.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
  <script src="js/components.js"></script>
</head>
<body>

<div id="app">

  <!-- Frost bar — topbar only, no tabs -->
  <div class="frost-bar" id="frost-chat">
    <div class="topbar">
      <div class="back-btn" id="chat-back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="topbar-title">Arkana AI</div>
      <div class="topbar-action" id="chat-clear-btn" title="Hapus riwayat chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Scroll area — padding-top injected by initFrostBar -->
  <div class="chat-scroll-area" id="scroll-chat">
    <div class="chat-messages" id="chat-messages">
      <!-- Rendered by ChatApp -->
    </div>
  </div>

  <!-- Input bar — in normal flex flow, NOT position:fixed -->
  <div class="chat-input-bar" id="chat-input-bar">
    <div class="chat-input-wrap">
      <textarea
        class="chat-textarea"
        id="chat-textarea"
        placeholder="Ketik pesan..."
        rows="1"
      ></textarea>
    </div>
    <button class="chat-send-btn" id="chat-send-btn" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22 11 13 2 9l20-7z" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

</div><!-- /#app -->

<!-- ══════════════════════════════════════
     CLEAR CHAT CONFIRM — inline overlay
     Wired directly in chat.js, no showConfirm() dependency.
══════════════════════════════════════ -->
<div class="confirm-overlay" id="chat-clear-overlay">
  <div class="confirm-box">
    <div class="confirm-title">Bersihkan Riwayat Pesan?</div>
    <div class="confirm-msg">Semua pesan akan dihapus permanen. Tindakan ini tidak bisa dibatalkan.</div>
    <div class="confirm-btns">
      <button class="btn btn-secondary" id="chat-clear-confirm-cancel">Batal</button>
      <button class="btn btn-danger"    id="chat-clear-confirm-ok">Hapus</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

    <div class="confirm-msg"   id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="btn btn-secondary" id="confirm-cancel">Batal</button>
      <button class="btn btn-danger"    id="confirm-ok">Hapus</button>
    </div>
  </div>
</div>

<script src="js/chat.js"></script>

<script>
(function() {
  function initFrostBar(frostId, scrollId, threshold) {
    threshold = threshold || 10;
    var frost  = document.getElementById(frostId);
    var scroll = document.getElementById(scrollId);
    var app    = document.getElementById('app');
    if (!frost || !scroll) return;
    function setpad() {
      var h = frost.offsetHeight;
      scroll.style.paddingTop = (h + 8) + 'px';
      if (app) app.style.setProperty('--frost-h', h + 'px');
    }
    setpad();
    if (window.ResizeObserver) new ResizeObserver(setpad).observe(frost);
    scroll.addEventListener('scroll', function() {
      frost.classList.toggle('topbar-shrunk', scroll.scrollTop > threshold);
    }, { passive: true });
  }
  document.addEventListener('DOMContentLoaded', function() {
    initFrostBar('frost-chat', 'scroll-chat');
  });
})();
</script>

</body>
</html>
